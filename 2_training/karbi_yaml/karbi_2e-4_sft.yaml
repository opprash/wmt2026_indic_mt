### model
model_name_or_path: /base/rd1/large_models/Qwen2.5-32B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: karbi_train
template: qwen
cutoff_len: 512
save_only_model: true
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: /base/rd1/large_models/train_save/lora/wmt_total/karbi/2e-4
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### eval
do_eval: true
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500
